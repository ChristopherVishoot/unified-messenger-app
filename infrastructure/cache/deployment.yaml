apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cache
  labels:
    app: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cache
  template:
    metadata:
      labels:
        app: cache
    spec:
      containers:
      - name: cache
        image: redis:8.6.1
        ports:
        - containerPort: 6379
