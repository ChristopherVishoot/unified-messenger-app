apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.cache.name }}"
  namespace: "{{ .Values.namespace }}"
  labels:
    app: "{{ .Values.cache.name }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{ .Values.cache.name }}"
  template:
    metadata:
      labels:
        app: "{{ .Values.cache.name }}"
    spec:
      containers:
      - name: "{{ .Values.cache.name }}"
        image: "{{ .Values.cache.image.repository }}:{{ .Values.cache.image.tag }}"
        ports:
        - containerPort: {{ .Values.cache.port }}
